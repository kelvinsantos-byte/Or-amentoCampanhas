<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campanhas de Segurança — Orçamento</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;--card:#1e2330;--card2:#242838;
  --border:#2a2f3d;--border2:#353b4e;--text:#f0f2f7;--text2:#8b93a8;--text3:#555e72;
  --orange:#4DBFBA;--orange2:#6ECECA;--orange-bg:rgba(77,191,186,0.12);--orange-border:rgba(77,191,186,0.3);
  --green:#18b87a;--green-bg:rgba(24,184,122,0.1);--green-border:rgba(24,184,122,0.3);
  --blue:#D95555;--blue-bg:rgba(217,85,85,0.1);--blue-border:rgba(217,85,85,0.3);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,0.1);--purple-border:rgba(168,85,247,0.3);
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:248px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;}
.logo-area{padding:28px 24px 20px;}
.logo-icon{width:38px;height:38px;background:var(--orange);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.logo-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.5;}
.logo-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text);line-height:1.25;}
.logo-sub{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.09em;}
.nav{padding:8px 12px;flex:1;}
.nav-label{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;padding:16px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);transition:all 0.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--orange-bg);color:var(--orange2);border:1px solid var(--orange-border);}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);}
.sync-info{font-size:10px;color:var(--text3);line-height:1.7;}
.sync-dot{width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.btn-reload{width:100%;margin-top:8px;padding:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text2);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;}
.btn-reload:hover{background:var(--card);color:var(--text);}
.main{margin-left:248px;flex:1;min-width:0;}
.topbar{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;}
.page-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text);}
.page-sub{font-size:12px;color:var(--text3);margin-top:4px;}
.content{padding:18px 24px 40px;max-width:1280px;}
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
.mc .mc-l{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;}
.mc .mc-v{font-size:22px;font-weight:700;font-family:'Syne',sans-serif;line-height:1;}
.mc .mc-s{font-size:11px;color:var(--text3);margin-top:5px;}
.mc.orange{border-color:var(--orange-border);background:var(--orange-bg);}
.mc.orange .mc-v{color:var(--orange2);}
.mc.green{border-color:var(--green-border);background:var(--green-bg);}
.mc.green .mc-v{color:var(--green);}
.sec-hdr{display:flex;align-items:center;margin-bottom:14px;}
.sec-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.sec-title::before{content:'';width:3px;height:14px;background:var(--orange);border-radius:2px;}
.tbl-wrap{border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--card2);padding:10px 12px;border-bottom:1px solid var(--border);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);white-space:nowrap;}
th.r,td.r{text-align:right;}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(255,255,255,0.02);}
.total-row td{background:var(--card2)!important;font-weight:700;color:var(--text)!important;}
.camp-col{background:rgba(232,98,42,0.05)!important;}
.camp-th{background:rgba(232,98,42,0.18)!important;color:var(--orange2)!important;}
/* CAMPANHAS */
.camp-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);margin-bottom:10px;overflow:hidden;transition:border-color 0.2s;}
.camp-card:hover{border-color:var(--border2);}
.camp-card.open{border-color:var(--orange-border);}
.camp-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;cursor:pointer;user-select:none;}
.camp-header:hover{background:rgba(255,255,255,0.015);}
.camp-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.m-badge{background:var(--orange-bg);border:1px solid var(--orange-border);color:var(--orange2);font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:0.06em;}
.c-name{font-size:15px;font-weight:700;color:var(--text);font-family:'Syne',sans-serif;}
.c-theme{font-size:12px;color:var(--text3);font-style:italic;}
.c-totals{display:flex;align-items:center;gap:24px;}
.ct-item{text-align:right;}
.ct-item .ctl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px;}
.ct-item .ctv{font-size:14px;font-weight:700;}
.chevron{width:20px;height:20px;color:var(--text3);transition:transform 0.25s;flex-shrink:0;}
.chevron.open{transform:rotate(90deg);}
.camp-body{border-top:1px solid var(--border);padding:24px;}
.field-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px;display:flex;align-items:center;gap:7px;}
.f-badge{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:1px 7px;font-size:9px;font-weight:500;color:var(--text3);text-transform:none;letter-spacing:0;}
.inp{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s,box-shadow 0.15s;width:100%;max-width:440px;}
.inp:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,98,42,0.1);}
.inp::placeholder{color:var(--text3);}
.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px;}
.sbox-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-o{background:var(--orange);}
.dot-g{background:var(--green);}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px;margin-bottom:14px;}
.chk-res{display:flex;align-items:center;gap:9px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text2);transition:all 0.15s;background:var(--card);}
.chk-res:hover{border-color:var(--border2);color:var(--text);}
.chk-res.sel-o{border-color:var(--orange-border);background:var(--orange-bg);color:var(--orange2);}
.chk-res.sel-g{border-color:var(--green-border);background:var(--green-bg);color:var(--green);}
.chk-res input{width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.edt{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 9px;font-size:12px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s;text-align:right;}
.edt:focus{border-color:var(--orange);}
.edt.g:focus{border-color:var(--green);}
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:10px;}
.foto-slot{aspect-ratio:4/3;border:2px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;cursor:pointer;position:relative;overflow:hidden;background:var(--bg3);transition:all 0.15s;}
.foto-slot:hover{border-color:var(--orange);background:var(--orange-bg);}
.foto-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.foto-slot svg{width:22px;height:22px;color:var(--text3);}
.foto-slot span{font-size:10px;color:var(--text3);}
.rm-foto{position:absolute;top:6px;right:6px;width:22px;height:22px;background:rgba(0,0,0,0.75);border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:#fff;z-index:2;}
.foto-slot:hover .rm-foto{display:flex;}
.res-cfg-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border);}
.res-cfg-row:last-child{border-bottom:none;}
.res-cfg-name{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.warn{font-size:11px;color:var(--orange2);background:var(--orange-bg);border:1px solid var(--orange-border);border-radius:7px;padding:8px 12px;margin-top:10px;}
.loader-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top:3px solid var(--orange);border-radius:50%;animation:spin 0.75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* ARTES */
.artes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:10px;}
.arte-slot{border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;}
.arte-slot-label{padding:9px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.arte-slot-label .rm-arte{width:18px;height:18px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--text3);border:1px solid var(--border);transition:all 0.15s;}
.arte-slot-label .rm-arte:hover{background:rgba(232,98,42,0.2);color:var(--orange2);border-color:var(--orange-border);}
.arte-preview{aspect-ratio:3/2;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;background:var(--bg3);transition:background 0.15s;}
.arte-preview:hover{background:var(--bg2);}
.arte-preview img{width:100%;height:100%;object-fit:contain;padding:6px;}
.arte-preview .upload-hint{display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;}
.arte-preview .upload-hint svg{width:24px;height:24px;color:var(--text3);}
.arte-preview .upload-hint span{font-size:10px;color:var(--text3);}
.arte-preview input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
/* GARAGENS */
.garagens-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.garagem-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color 0.2s;}
.garagem-card:hover{border-color:var(--border2);}
.garagem-card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.garagem-empresa{font-size:13px;font-weight:700;color:var(--text);font-family:'Syne',sans-serif;}
.garagem-count{font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;}
.garagem-count.teal{background:var(--orange-bg);color:var(--orange2);border:1px solid var(--orange-border);}
.garagem-count.coral{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}
.garagem-list{padding:12px 18px;}
.garagem-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.garagem-item:last-child{border-bottom:none;}
.garagem-nome{font-size:12px;color:var(--text2);}
.garagem-qtd{font-size:12px;font-weight:600;color:var(--text);}
.garagem-empty{font-size:12px;color:var(--text3);padding:12px 0;text-align:center;}
.gar-loading{text-align:center;padding:40px;color:var(--text3);font-size:12px;}
/* DRAG OVER */
.arte-preview.drag-over{border:2px dashed var(--orange);background:var(--orange-bg);}
.arte-preview.drag-over .upload-hint svg,.arte-preview.drag-over .upload-hint span{color:var(--orange2);}
.foto-slot.drag-over{border-color:var(--orange);background:var(--orange-bg);}
.foto-slot.drag-over svg,.foto-slot.drag-over span{color:var(--orange2);}
/* ── DASHBOARD ── */
.dash-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.dash-month-badge{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.01em;}
.dash-month-sub{font-size:12px;color:var(--text3);margin-top:4px;}
.dash-nav-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.15s;font-family:inherit;}
.dash-nav-btn:hover{background:var(--orange-bg);border-color:var(--orange-border);color:var(--orange2);}
.dash-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;position:relative;overflow:hidden;}
.dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border);}
.dash-card.teal::before{background:var(--orange);}
.dash-card.green::before{background:var(--green);}
.dash-card.red::before{background:#e05555;}
.dash-card .dc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.dash-card .dc-icon svg{width:16px;height:16px;}
.dash-card .dc-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:6px;}
.dash-card .dc-value{font-size:22px;font-weight:700;font-family:'Syne',sans-serif;color:var(--text);line-height:1.1;}
.dash-card .dc-sub{font-size:11px;color:var(--text3);margin-top:5px;}
.dash-card .dc-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:6px;}
.dash-arte-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.dash-arte-label{padding:10px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.dash-arte-label .dot-teal{width:7px;height:7px;border-radius:50%;background:var(--orange);flex-shrink:0;display:inline-block;}
.dash-arte-img{display:flex;align-items:center;justify-content:center;padding:16px;min-height:140px;background:var(--bg3);}
.dash-arte-img img{max-width:100%;max-height:360px;border-radius:6px;object-fit:contain;}
.dash-arte-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:8px;min-height:140px;}
.dash-arte-empty svg{width:28px;height:28px;color:var(--text3);}
.dash-arte-empty span{font-size:11px;color:var(--text3);}
@media(max-width:900px){.dash-cards{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo-area">
    <img src="https://res.cloudinary.com/dxnruvmgu/image/upload/v1770865209/Intelig%C3%AAncia_vertical_branco_eqljpf.png" alt="Logo" style="width:100%;max-width:160px;display:block;margin-bottom:14px;">
    <div class="logo-sub" style="margin-top:0;">Orçamento Anual</div>
  </div>
  <nav class="nav">
    <div class="nav-label">Navegação</div>
    <button class="nav-item" id="nav-dashboard" onclick="switchTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="9" height="9" rx="1"/><rect x="13" y="3" width="9" height="9" rx="1"/><rect x="2" y="14" width="9" height="9" rx="1"/><rect x="13" y="14" width="9" height="9" rx="1"/></svg>
      Dashboard
    </button>
    <button class="nav-item active" id="nav-quadro" onclick="switchTab('quadro')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Quadro de Motoristas
    </button>
    <button class="nav-item" id="nav-recursos" onclick="switchTab('recursos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      Recursos
    </button>
    <button class="nav-item" id="nav-campanhas" onclick="switchTab('campanhas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Campanhas
    </button>
    <div class="nav-label">Garagens</div>
    <button class="nav-item" id="nav-gfaixa" onclick="switchTab('gfaixa')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="3" rx="1"/><path d="M3 7h18M3 17h18"/></svg>
      Garagens — Faixa
    </button>
    <button class="nav-item" id="nav-gbanner" onclick="switchTab('gbanner')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="13" rx="1"/><path d="M4 17h16M9 21h6"/></svg>
      Garagens — Banner
    </button>
    <div class="nav-label">Distribuição</div>
    <button class="nav-item" id="nav-envio" onclick="switchTab('envio')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      Separação / Envio
    </button>
    <div class="nav-label">Gestão</div>
    <button class="nav-item" id="nav-gerencial" onclick="switchTab('gerencial')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Gerencial
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="sync-info"><span class="sync-dot"></span>Google Sheets<br><span id="sync-time" style="color:var(--text2);">conectando...</span></div>
    <button class="btn-reload" onclick="reloadAll()">↻ Atualizar dados</button>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
      <div style="font-size:10px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:5px;">
        <span id="fb-dot" style="width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;"></span>
        <span id="fb-status">Firebase — aguardando</span>
      </div>

    </div>
  </div>
</aside>

</main>
</div>

<script>
const CSV_MOT='https://docs.google.com/spreadsheets/d/e/2PACX-1vRLM9rAFP38q8N_0lffiZ5mMN9fD8S09RU6tQhMoTmb8fcR6h5G4JFYrRCtuvRl5_fcNqvPQR7PR94o/pub?gid=694466935&single=true&output=csv';

/* ============================================================
   TAMANHO DOS LOGOS NO RODAPÉ DO DASHBOARD
   Edite os valores abaixo (em px) para ajustar cada logo
   ============================================================ */
const LOGO_GRUPO_H   = 50;   // Logo Grupo JCA (topo)
const LOGO_1001_H    = 40;   // Logo 1001
const LOGO_CAT_H     = 20;   // Logo Catarinense
const LOGO_COMETA_H  = 36;   // Logo Cometa
const LOGO_EXP_H     = 75;   // Logo Expresso do Sul
const LOGO_RRP_H     = 40;   // Logo Rápido Ribeirão
/* ============================================================ */
const CSV_FAIXA='https://docs.google.com/spreadsheets/d/e/2PACX-1vRLM9rAFP38q8N_0lffiZ5mMN9fD8S09RU6tQhMoTmb8fcR6h5G4JFYrRCtuvRl5_fcNqvPQR7PR94o/pub?gid=1977350355&single=true&output=csv';
const CSV_BANNER='https://docs.google.com/spreadsheets/d/e/2PACX-1vRLM9rAFP38q8N_0lffiZ5mMN9fD8S09RU6tQhMoTmb8fcR6h5G4JFYrRCtuvRl5_fcNqvPQR7PR94o/pub?gid=1686797334&single=true&output=csv';

const MF=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MS=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const CI=[0,1,2,3,4,6,8,11];
const RES=['FOLDER','BANNER','FAIXA','BRINDE','VÍDEO','MÃO DE OBRA','ADESIVO DE ÔNIBUS'];
const PREV=['DEZ','JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV'];
const EMPRESAS=['1001','1001 URBANO','COMETA','CATARINENSE','SIT','MACAENSE','OPÇÃO'];
const PAGES={
  dashboard:{t:'Dashboard',s:'Visão executiva da campanha atual'},
  quadro:{t:'Quadro de Motoristas',s:'Motoristas orçados por empresa e mês'},
  recursos:{t:'Recursos',s:'Valor unitário de cada recurso para o ano'},
  campanhas:{t:'Campanhas',s:'Configure os recursos e registre o realizado'},
  gfaixa:{t:'Garagens — Faixa',s:'Garagens por empresa para instalação de faixas'},
  gbanner:{t:'Garagens — Banner',s:'Garagens por empresa para instalação de banners'},
  envio:{t:'Separação / Envio',s:'Distribuição de folders e brindes por empresa'},
  gerencial:{t:'Gerencial',s:'Resumo executivo por campanha — orçado vs realizado'}
};

const ARTES_KEYS=['folder_frente','folder_verso','banner','faixa'];
const ARTES_LABELS={folder_frente:'FOLDER — Frente',folder_verso:'FOLDER — Verso',banner:'BANNER',faixa:'FAIXA'};

let companies=[],driverData={};
let resources=RES.map(n=>({name:n,price:0}));
let camps={};
CI.forEach(mi=>{camps[mi]={theme:'',resumo:'',open:false,orc:RES.map(()=>false),real:RES.map(()=>({sel:false,price:null,qty:null})),fotos:[],artes:{folder_frente:null,folder_verso:null,banner:null,faixa:null}};});
let activeTab='quadro';
let garaFaixa={};
let garaBanner={};

// Campanhas extras (coringa)
let extras=[
  {ativa:false,mes:null,theme:'',resumo:'',orc:RES.map(()=>false),real:RES.map(()=>({sel:false,price:null,qty:null})),fotos:[],artes:{folder_frente:null,folder_verso:null,banner:null,faixa:null},open:false},
  {ativa:false,mes:null,theme:'',resumo:'',orc:RES.map(()=>false),real:RES.map(()=>({sel:false,price:null,qty:null})),fotos:[],artes:{folder_frente:null,folder_verso:null,banner:null,faixa:null},open:false}
];

function getTotal(mi){return companies.reduce((s,c)=>s+(driverData[c]&&driverData[c][mi]||0),0);}
function fmt(n){return(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtN(n){return(n||0).toLocaleString('pt-BR');}

/* Quantidade orçada por recurso — regras fixas */
function getTotalGaragens(data){return EMPRESAS.reduce((s,emp)=>s+(data[emp]?data[emp].length:0),0);}
function getQtdOrc(ri,mi){
  const nome=RES[ri];
  if(nome==='BANNER')return getTotalGaragens(garaBanner);
  if(nome==='FAIXA')return getTotalGaragens(garaFaixa);
  if(nome==='VÍDEO')return 1;
  if(nome==='MÃO DE OBRA')return 1;
  if(nome==='ADESIVO DE ÔNIBUS')return 3;
  return getTotal(mi); // FOLDER, BRINDE → motoristas do mês
}
function getQtdOrcLabel(ri){
  const nome=RES[ri];
  if(nome==='BANNER')return 'garagens banner';
  if(nome==='FAIXA')return 'garagens faixa';
  if(nome==='VÍDEO')return 'fixo';
  if(nome==='MÃO DE OBRA')return 'fixo';
  if(nome==='ADESIVO DE ÔNIBUS')return 'fixo';
  return 'motoristas';
}

function calcOrc(mi){return camps[mi].orc.reduce((s,sel,ri)=>sel?s+(resources[ri].price||0)*getQtdOrc(ri,mi):s,0);}
function calcReal(mi){return camps[mi].real.reduce((s,r,ri)=>{if(!r.sel)return s;const p=r.price!==null?r.price:(resources[ri].price||0);const q=r.qty!==null?r.qty:0;return s+p*q;},0);}
function totOrc(){return CI.reduce((s,mi)=>s+calcOrc(mi),0);}
function totReal(){return CI.reduce((s,mi)=>s+calcReal(mi),0);}

/* ── CSV parsers ── */
function parseCSVRows(text){
  return text.trim().split('\n').filter(l=>l.trim()).map(l=>{
    const r=[];let cur='';let q=false;
    for(const c of l){if(c==='"'){q=!q;}else if(c===','&&!q){r.push(cur.trim());cur='';}else cur+=c;}
    r.push(cur.trim());return r;
  });
}

function parseMot(text){
  const rows=parseCSVRows(text);
  companies=[];driverData={};
  for(let i=1;i<rows.length;i++){
    const row=rows[i];if(!row[0]||!row[0].trim())continue;
    const n=row[0].trim();companies.push(n);driverData[n]={};
    for(let m=0;m<12;m++){const raw=(row[m+1]||'').replace(/\./g,'').replace(',','.');driverData[n][m]=parseInt(raw)||0;}
  }
  const nd=new Date();
  document.getElementById('sync-time').textContent=nd.toLocaleDateString('pt-BR')+' '+nd.getHours()+':'+String(nd.getMinutes()).padStart(2,'0');
  document.getElementById('ano-badge').textContent=nd.getFullYear();
  document.getElementById('mrow').style.display='grid';
  updMetrics();renderQuadro();renderCampanhas();
}

function parseGaragens(text, empresaCols){
  /* Estrutura: cada coluna é uma empresa, cada linha é uma garagem */
  const rows=parseCSVRows(text);
  const result={};
  empresaCols.forEach((emp,ci)=>{result[emp]=[];});
  const header=rows[0];
  // A primeira linha é o cabeçalho com os nomes das empresas
  for(let ri=1;ri<rows.length;ri++){
    const row=rows[ri];
    empresaCols.forEach((emp,ci)=>{
      const val=(row[ci]||'').trim();
      if(val)result[emp].push(val);
    });
  }
  return result;
}

function updMetrics(){
  let g=0;MS.forEach((_,mi)=>g+=getTotal(mi));
  document.getElementById('mc-emp').textContent=companies.length;
  document.getElementById('mc-tot').textContent=fmtN(g);
  document.getElementById('mc-orc').textContent='R$ '+fmt(totOrc());
  document.getElementById('mc-real').textContent='R$ '+fmt(totReal());
}

function switchTab(tab){
  activeTab=tab;
  ['dashboard','quadro','recursos','campanhas','gfaixa','gbanner','envio','gerencial'].forEach(t=>{
    document.getElementById('pnl-'+t).style.display=t===tab?'block':'none';
    const b=document.getElementById('nav-'+t);if(b)b.className=t===tab?'nav-item active':'nav-item';
  });
  document.getElementById('page-title').textContent=PAGES[tab].t;
  document.getElementById('page-sub').textContent=PAGES[tab].s;
  document.getElementById('mrow').style.display=(tab==='quadro'&&companies.length>0)?'grid':'none';
  if(tab==='envio')renderEnvio();
  if(tab==='gerencial')renderGerencial();
  if(tab==='dashboard')renderDashboard();
}

/* ── QUADRO ── */
function renderQuadro(){
  let h='<div class="sec-hdr"><div class="sec-title">Motoristas por empresa e mês</div></div>';
  h+='<div class="tbl-wrap"><table><thead><tr><th style="min-width:150px;">Empresa</th>';
  MS.forEach((m,mi)=>{const c=CI.includes(mi);h+=`<th class="r${c?' camp-th':''}" style="width:60px;">${m}${c?'<div style="font-size:8px;font-weight:400;margin-top:1px;opacity:0.75;">camp</div>':''}</th>`;});
  h+='<th class="r" style="min-width:68px;">TOTAL</th></tr></thead><tbody>';
  companies.forEach(co=>{
    let yt=0;h+=`<tr><td style="font-weight:600;color:var(--text);">${co}</td>`;
    MS.forEach((_,mi)=>{const v=driverData[co][mi]||0;yt+=v;const c=CI.includes(mi);h+=`<td class="r${c?' camp-col':''}">${v?fmtN(v):'<span style="color:var(--text3)">—</span>'}</td>`;});
    h+=`<td class="r" style="font-weight:700;color:var(--text);">${fmtN(yt)}</td></tr>`;
  });
  h+='<tr class="total-row"><td>TOTAL</td>';
  let g=0;
  MS.forEach((_,mi)=>{const t=getTotal(mi);g+=t;const c=CI.includes(mi);h+=`<td class="r${c?' camp-col':''}" style="${c?'color:var(--orange2);font-weight:700;':''}">${fmtN(t)}</td>`;});
  h+=`<td class="r">${fmtN(g)}</td></tr></tbody></table></div>`;
  h+='<p style="font-size:11px;color:var(--text3);margin-top:10px;">Meses destacados possuem campanha de segurança programada.</p>';
  document.getElementById('pnl-quadro').innerHTML=h;
}

/* ── RECURSOS ── */
function renderRecursos(){
  let h=`<div class="sec-hdr"><div class="sec-title">Valor unitário por recurso</div></div>`;
  h+=`<p style="font-size:12px;color:var(--text3);margin-bottom:18px;line-height:1.7;">Defina o valor de cada recurso para o ano. Eles serão usados automaticamente em todas as campanhas.</p>`;
  h+=`<div class="tbl-wrap" style="max-width:480px;"><div style="background:var(--card);">`;
  resources.forEach((res,ri)=>{
    h+=`<div class="res-cfg-row">
      <div class="res-cfg-name">${res.name}</div>
      <div style="display:flex;align-items:center;gap:7px;">
        <span style="font-size:12px;color:var(--text3);">R$</span>
        <input class="edt" type="number" min="0" step="0.01" value="${res.price||''}" placeholder="0,00" style="width:130px;"
          oninput="resources[${ri}].price=parseFloat(this.value)||0;refreshAllHeaders()">
      </div>
    </div>`;
  });
  h+=`</div></div>`;
  document.getElementById('pnl-recursos').innerHTML=h;
}

/* ── CAMPANHAS ── */
function renderCampanhas(){
  let h='';
  CI.forEach(mi=>{
    const camp=camps[mi];const ot=calcOrc(mi);const rt=calcReal(mi);
    h+=`<div class="camp-card${camp.open?' open':''}" id="card-${mi}">
      <div class="camp-header" onclick="toggleCard(${mi})">
        <div class="camp-meta">
          <span class="m-badge">${MS[mi]}</span>
          <span class="c-name">${MF[mi]}</span>
          <span class="c-theme" id="hdr-theme-${mi}">${camp.theme||'Tema não definido'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:20px;">
          <div class="c-totals">
            <div class="ct-item"><div class="ctl">Orçado</div><div class="ctv" id="hdr-orc-${mi}" style="color:${ot>0?'var(--orange2)':'var(--text3)'};">R$ ${fmt(ot)}</div></div>
            <div class="ct-item"><div class="ctl">Realizado</div><div class="ctv" id="hdr-real-${mi}" style="color:${rt>0?'var(--green)':'var(--text3)'};">R$ ${fmt(rt)}</div></div>
          </div>
          <svg class="chevron${camp.open?' open':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
      <div id="body-${mi}" style="display:${camp.open?'block':'none'};">${camp.open?renderBody(mi):''}</div>
    </div>`;
  });

  // Campanhas extras
  h+=`<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px;">
    <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.09em;color:var(--text3);padding:8px 4px 12px;">Campanhas extras</div>`;
  extras.forEach((ex,ei)=>{
    h+=renderExtraCard(ei);
  });
  h+=`</div>`;

  document.getElementById('pnl-campanhas').innerHTML=h;
}

function renderExtraCard(ei){
  const ex=extras[ei];
  const mi=ex.mes;
  const tot=mi!==null?getTotal(mi):0;
  const ot=ex.ativa&&mi!==null?calcExtraOrc(ei):0;
  const rt=ex.ativa&&mi!==null?calcExtraReal(ei):0;

  let h=`<div class="camp-card${ex.ativa&&ex.open?' open':''}" id="extra-card-${ei}" style="border-style:dashed;margin-bottom:10px;">
    <div class="camp-header" style="cursor:default;">
      <div class="camp-meta" style="gap:10px;flex:1;">
        <span style="font-size:10px;font-weight:700;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);padding:3px 8px;border-radius:5px;letter-spacing:0.05em;">EXTRA ${ei+1}</span>`;

  if(ex.ativa){
    // Seletor de mês
    h+=`<select onchange="extras[${ei}].mes=parseInt(this.value);extras[${ei}].theme='';renderExtraInline(${ei})"
      style="background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text);font-family:'Inter',sans-serif;outline:none;cursor:pointer;">
      <option value="" ${mi===null?'selected':''}>Selecione o mês...</option>`;
    MS.forEach((m,idx)=>{h+=`<option value="${idx}" ${mi===idx?'selected':''}>${m} — ${MF[idx]}</option>`;});
    h+=`</select>`;
    if(mi!==null){
      h+=`<span class="c-name" style="font-size:14px;">${MF[mi]}</span>`;
      if(ex.theme)h+=`<span class="c-theme">${ex.theme}</span>`;
    }
  } else {
    h+=`<span style="font-size:13px;color:var(--text3);font-style:italic;">Campanha extra não ativada</span>`;
  }

  h+=`</div>
      <div style="display:flex;align-items:center;gap:14px;">`;

  if(ex.ativa&&mi!==null){
    h+=`<div class="c-totals">
      <div class="ct-item"><div class="ctl">Orçado</div><div class="ctv" id="xhdr-orc-${ei}" style="color:${ot>0?'var(--orange2)':'var(--text3)'};">R$ ${fmt(ot)}</div></div>
      <div class="ct-item"><div class="ctl">Realizado</div><div class="ctv" id="xhdr-real-${ei}" style="color:${rt>0?'var(--green)':'var(--text3)'};">R$ ${fmt(rt)}</div></div>
    </div>`;
    h+=`<svg class="chevron${ex.open?' open':''}" onclick="toggleExtraCard(${ei})" style="cursor:pointer;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;
  }

  // Toggle ON/OFF
  const isOn=ex.ativa;
  h+=`<div onclick="toggleExtra(${ei})" title="${isOn?'Desativar':'Ativar'} campanha extra"
    style="width:40px;height:22px;border-radius:11px;background:${isOn?'var(--orange)':'var(--border2)'};position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;">
    <div style="width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:${isOn?'21px':'3px'};transition:left 0.2s;"></div>
  </div>`;

  h+=`</div></div>`;

  // Body se ativo e aberto e mês selecionado
  if(ex.ativa&&ex.open&&mi!==null){
    h+=`<div id="extra-body-${ei}" style="border-top:1px solid var(--border);">${renderExtraBody(ei)}</div>`;
  } else {
    h+=`<div id="extra-body-${ei}" style="display:none;"></div>`;
  }

  h+=`</div>`;
  return h;
}

function toggleExtra(ei){
  extras[ei].ativa=!extras[ei].ativa;
  if(!extras[ei].ativa){extras[ei].open=false;extras[ei].mes=null;}
  document.getElementById('extra-card-'+ei).outerHTML=renderExtraCard(ei);
}

function toggleExtraCard(ei){
  const ex=extras[ei];
  if(!ex.ativa||ex.mes===null)return;
  ex.open=!ex.open;
  const body=document.getElementById('extra-body-'+ei);
  const card=document.getElementById('extra-card-'+ei);
  if(body){if(ex.open){body.style.display='block';body.innerHTML=renderExtraBody(ei);}else body.style.display='none';}
  if(card){const ch=card.querySelector('.chevron');if(ch)ch.className=ex.open?'chevron open':'chevron';}
}

function renderExtraInline(ei){
  const card=document.getElementById('extra-card-'+ei);
  if(card)card.outerHTML=renderExtraCard(ei);
}

function calcExtraOrc(ei){
  const ex=extras[ei];const mi=ex.mes;if(mi===null)return 0;
  const tot=getTotal(mi);
  return ex.orc.reduce((s,sel,ri)=>sel?s+(resources[ri].price||0)*getQtdOrc(ri,mi):s,0);
}
function calcExtraReal(ei){
  const ex=extras[ei];if(ex.mes===null)return 0;
  return ex.real.reduce((s,r,ri)=>{if(!r.sel)return s;const p=r.price!==null?r.price:(resources[ri].price||0);const q=r.qty!==null?r.qty:0;return s+p*q;},0);
}

function refreshExtraHeader(ei){
  const ot=calcExtraOrc(ei),rt=calcExtraReal(ei);
  const ho=document.getElementById('xhdr-orc-'+ei);const hr=document.getElementById('xhdr-real-'+ei);
  if(ho){ho.textContent='R$ '+fmt(ot);ho.style.color=ot>0?'var(--orange2)':'var(--text3)';}
  if(hr){hr.textContent='R$ '+fmt(rt);hr.style.color=rt>0?'var(--green)':'var(--text3)';}
}

function toggleExtraOrc(ei,ri){extras[ei].orc[ri]=!extras[ei].orc[ri];if(extras[ei].open)document.getElementById('extra-body-'+ei).innerHTML=renderExtraBody(ei);refreshExtraHeader(ei);}
function toggleExtraReal(ei,ri){extras[ei].real[ri].sel=!extras[ei].real[ri].sel;if(extras[ei].open)document.getElementById('extra-body-'+ei).innerHTML=renderExtraBody(ei);refreshExtraHeader(ei);}

function renderExtraBody(ei){
  const ex=extras[ei];const mi=ex.mes;const tot=getTotal(mi);
  // Reutiliza a mesma lógica do renderBody mas com extra
  let h=`<div class="camp-body">
    <div style="margin-bottom:22px;display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;">
      <div>
        <div class="field-label">Tema da campanha</div>
        <input class="inp" type="text" value="${ex.theme}" placeholder="Insira o tema..."
          oninput="autoSave();extras[${ei}].theme=this.value">
      </div>
      <div>
        <div class="field-label">Resumo da campanha</div>
        <textarea class="inp" rows="2" placeholder="Descreva brevemente..."
          style="resize:vertical;min-height:42px;font-family:'Inter',sans-serif;line-height:1.5;"
          oninput="autoSave();extras[${ei}].resumo=this.value">${ex.resumo||''}</textarea>
      </div>
    </div>`;

  // ORÇADO
  h+=`<div class="sbox"><div class="sbox-title"><span class="dot dot-o"></span>Orçado <span style="margin-left:auto;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0;">${fmtN(tot)} motoristas em ${MF[mi]}</span></div>
    <div class="res-grid">`;
  resources.forEach((res,ri)=>{const s=ex.orc[ri];h+=`<label class="chk-res${s?' sel-o':''}" onclick="toggleExtraOrc(${ei},${ri});return false;"><input type="checkbox" ${s?'checked':''} style="accent-color:var(--orange)" onchange="autoSave();toggleExtraOrc(${ei},${ri})">${res.name}</label>`;});
  h+=`</div>`;
  if(ex.orc.some(s=>s)){
    h+=`<div class="tbl-wrap"><table><thead><tr><th>Recurso orçado</th><th class="r">Valor unit.</th><th class="r">Qtd.</th><th style="font-size:9px;color:var(--text3);font-weight:400;text-align:right;padding-right:8px;">base</th><th class="r">Total</th></tr></thead><tbody>`;
    let ot=0;
    ex.orc.forEach((sel,ri)=>{

function addExtraArte(ei,key,input){const file=input.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{extras[ei].artes[key]=e.target.result;if(extras[ei].open)document.getElementById('extra-body-'+ei).innerHTML=renderExtraBody(ei);};r.readAsDataURL(file);}
function dropExtraArte(ei,key,ev){const file=ev.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;const r=new FileReader();r.onload=e=>{extras[ei].artes[key]=e.target.result;if(extras[ei].open)document.getElementById('extra-body-'+ei).innerHTML=renderExtraBody(ei);};r.readAsDataURL(file);}
function addExtraFoto(ei,input){const file=input.files[0];if(!file||extras[ei].fotos.length>=3)return;const r=new FileReader();r.onload=e=>{extras[ei].fotos.push(e.target.result);if(extras[ei].open)document.getElementById('extra-body-'+ei).innerHTML=renderExtraBody(ei);};r.readAsDataURL(file);}
function dropExtraFoto(ei,ev){const file=ev.dataTransfer.files[0];if(!file||!file.type.startsWith('image/')||extras[ei].fotos.length>=3)return;const r=new FileReader();r.onload=e=>{extras[ei].fotos.push(e.target.result);if(extras[ei].open)document.getElementById('extra-body-'+ei).innerHTML=renderExtraBody(ei);};r.readAsDataURL(file);}

function renderEnvio(){
  const pnl=document.getElementById('pnl-envio');
  const divMode=window.envioMode||4000;
  const mesSel=window.envioMes!==undefined?window.envioMes:CI[0];

  // Quantidade de cada empresa no mês selecionado
  const rows=companies.map(co=>{
    const necessario=driverData[co]&&driverData[co][mesSel]||0;
    return {co,necessario};
  });
  const totalNec=rows.reduce((s,r)=>s+r.necessario,0);

  // Distribuição proporcional com arredondamento que fecha o total exato
  const rowsCalc=rows.map(r=>{
    const divisao=totalNec>0?Math.round(Math.round((r.necessario/totalNec)*divMode)/10)*10:0;
    return {...r,divisao};
  });
  // Ajusta diferença no maior valor
  const somaDiv=rowsCalc.reduce((s,r)=>s+r.divisao,0);
  const diff=divMode-somaDiv;
  if(diff!==0){
    const idx=rowsCalc.reduce((mi,r,i,a)=>r.necessario>a[mi].necessario?i:mi,0);
    rowsCalc[idx].divisao+=diff;
  }
  rowsCalc.forEach(r=>{
    r.acrescimo=r.divisao-r.necessario;
    r.perc=r.necessario>0?((r.acrescimo/r.necessario)*100).toFixed(1):'—';
  });
  const totalDiv=rowsCalc.reduce((s,r)=>s+r.divisao,0);
  const totalAcrescimo=totalDiv-totalNec;
  const pctTotal=totalNec>0?((totalAcrescimo/totalNec)*100).toFixed(1):0;

  let h='';

  // Controles: seletor de mês + toggle 4000/5000
  h+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;">
    <div class="sec-title">Distribuição por empresa</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">`;

  // Seletor de mês de campanha
  h+=`<div style="display:flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:4px;">`;
  CI.forEach(mi=>{
    const ativo=mi===mesSel;
    h+=`<button onclick="window.envioMes=${mi};renderEnvio()"
      style="padding:6px 12px;border-radius:var(--radius);border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.15s;letter-spacing:0.04em;
      background:${ativo?'var(--orange)':'transparent'};color:${ativo?'#fff':'var(--text3)'};">
      ${MS[mi]}
    </button>`;
  });
  h+=`</div>`;

  // Toggle 4000/5000
  h+=`<div style="display:flex;align-items:center;gap:4px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:4px;">
    <button onclick="window.envioMode=4000;renderEnvio()"
      style="padding:7px 18px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.15s;
      background:${divMode===4000?'var(--orange)':'transparent'};color:${divMode===4000?'#fff':'var(--text3)'};">4.000 un.</button>
    <button onclick="window.envioMode=5000;renderEnvio()"
      style="padding:7px 18px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;transition:all 0.15s;
      background:${divMode===5000?'var(--orange)':'transparent'};color:${divMode===5000?'#fff':'var(--text3)'};">5.000 un.</button>
  </div>`;

  h+=`</div></div>`;

  // Cards de resumo
  h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;">
    <div class="mc"><div class="mc-l">Motoristas em ${MF[mesSel]}</div><div class="mc-v">${fmtN(totalNec)}</div><div class="mc-s">total no mês da campanha</div></div>
    <div class="mc orange"><div class="mc-l">Total enviado</div><div class="mc-v" style="color:var(--orange2);">${fmtN(totalDiv)}</div><div class="mc-s">${fmtN(divMode)} unidades</div></div>
    <div class="mc" style="border-color:var(--green-border);background:var(--green-bg);"><div class="mc-l">Acréscimo total</div><div class="mc-v" style="color:var(--green);">+${fmtN(totalAcrescimo)}</div><div class="mc-s">${pctTotal}% acima do necessário</div></div>
  </div>`;

  // Tabela
  h+=`<div class="tbl-wrap"><table><thead><tr>
    <th style="min-width:150px;">Empresa</th>
    <th class="r">Qtd. ${MF[mesSel]}</th>
    <th class="r" style="color:var(--orange2);">Divisão ${fmtN(divMode)}</th>
    <th class="r" style="color:var(--green);">Acréscimo</th>
    <th class="r">Percentual</th>
  </tr></thead><tbody>`;

  rowsCalc.forEach(r=>{
    const isPos=r.acrescimo>=0;
    const percNum=r.necessario>0?Math.min(Math.abs(parseFloat(r.perc)),100):0;
    h+=`<tr>

function getCurrentCampIdx(){
  const m=new Date().getMonth();
  let best=0;
  for(let i=0;i<CI.length;i++){if(CI[i]<=m)best=i;}
  return best;
}

/* ── GERENCIAL ── */
function renderGerencial(){
  const pnl=document.getElementById('pnl-gerencial');

  const rows=CI.map(mi=>{
    const camp=camps[mi];
    const orc=calcOrc(mi);
    const real=calcReal(mi);
    const diff=real-orc;
    const pct=(orc>0&&real>0)?((diff/orc)*100):null;
    return {mi,theme:camp.theme,orc,real,diff,pct};
  });

  const totalOrcado=rows.reduce((s,r)=>s+r.orc,0);
  const totalRealizado=rows.reduce((s,r)=>s+r.real,0);

  const totalPct=totalOrcado>0&&totalRealizado>0?((totalDiff/totalOrcado)*100):null;

  // Cards resumo
  let h=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;">
    <div class="mc orange">
      <div class="mc-l">Total orçado</div>

    </div>
    <div class="mc green">
      <div class="mc-l">Total realizado</div>

    </div>
    <div class="mc" style="border-color:${totalDiff>0?'rgba(217,85,85,0.3)':totalDiff<0?'var(--green-border)':'var(--border)'};background:${totalDiff>0?'rgba(217,85,85,0.1)':totalDiff<0?'var(--green-bg)':'var(--card)'};">
      <div class="mc-l">Diferença total</div>
      <div class="mc-v" style="color:${totalDiff>0?'#e05555':totalDiff<0?'var(--green)':'var(--text3)'};">${totalPct!==null?(totalDiff>0?'+':'')+fmt(totalDiff):'—'}</div>
      <div class="mc-s">${totalPct!==null?(totalDiff>0?'Acima':'Abaixo')+' do orçado em '+(totalDiff>0?'+':'')+totalPct.toFixed(1)+'%':'sem dados ainda'}</div>
    </div>
  </div>`;

  // Tabela
  h+=`<div class="tbl-wrap"><table><thead><tr>
    <th style="width:60px;">Mês</th>
    <th>Tema</th>
    <th class="r">Orçado</th>
    <th class="r">Realizado</th>
    <th class="r" style="min-width:160px;">% Diferença</th>
  </tr></thead><tbody>`;

  rows.forEach(r=>{
    const semReal=r.real===0;
    const semOrc=r.orc===0;
    const acima=r.diff>0;
    const cor=semReal?'var(--text3)':acima?'#e05555':'var(--green)';
    const pctTxt=r.pct!==null?(r.diff>0?'+':'')+r.pct.toFixed(1)+'%':null;
    const label=semReal?'Sem registro':semOrc?'Sem orçamento':acima?'Acima do Orçado':'Abaixo do Orçado';
    const barPct=r.pct!==null?Math.min(Math.abs(r.pct),100):0;

    h+=`<tr>
      <td><span class="m-badge">${MS[r.mi]}</span></td>
      <td style="color:${r.theme?'var(--text)':'var(--text3)'};font-style:${r.theme?'normal':'italic'};">
        ${r.theme||'Tema não definido'}
      </td>
      <td class="r" style="font-weight:600;color:var(--orange2);">${r.orc>0?'R$ '+fmt(r.orc):'<span style="color:var(--text3)">—</span>'}</td>
      <td class="r" style="font-weight:600;color:var(--green);">${r.real>0?'R$ '+fmt(r.real):'<span style="color:var(--text3)">—</span>'}</td>
      <td class="r">
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:10px;">
          <div style="text-align:right;">
            <div style="font-size:12px;font-weight:700;color:${cor};">${pctTxt||'—'}</div>

          </div>
          <div style="width:80px;height:6px;background:var(--border2);border-radius:3px;overflow:hidden;flex-shrink:0;">
            <div style="width:${barPct}%;height:100%;background:${semReal?'var(--border2)':acima?'#e05555':'var(--green)'};border-radius:3px;transition:width 0.3s;"></div>
          </div>
        </div>
      </td>
    </tr>`;
  });

  // Total
  const corTotal=totalDiff>0?'#e05555':totalDiff<0?'var(--green)':'var(--text3)';
  h+=`<tr class="total-row">
    <td colspan="2">TOTAL</td>
    <td class="r" style="color:var(--orange2);">${totalOrcado>0?'R$ '+fmt(totalOrcado):'—'}</td>

      <div style="display:flex;align-items:center;justify-content:flex-end;gap:10px;">

        </div>
        <div style="width:80px;height:6px;background:var(--border2);border-radius:3px;overflow:hidden;flex-shrink:0;">
          <div style="width:${totalPct!==null?Math.min(Math.abs(totalPct),100):0}%;height:100%;background:${totalDiff>0?'#e05555':'var(--green)'};border-radius:3px;"></div>
        </div>
      </div>

  h+=`</tbody></table></div>`;
  h+=`<p style="font-size:11px;color:var(--text3);margin-top:10px;">Vermelho = acima do orçado · Verde = abaixo do orçado (economia). Campanhas sem realizado registrado aparecem como "Sem registro".</p>`;

  pnl.innerHTML=h;
}

/* ── GARAGENS ── */
function renderGaragens(data, tipo){
  const isTeal = tipo==='faixa';
  const accentClass = isTeal ? 'teal' : 'coral';
  const accentColor = isTeal ? 'var(--orange2)' : 'var(--blue)';

  if(!data||Object.keys(data).length===0){
    return `<div class="loader-screen"><div class="spinner"></div><span style="font-size:13px;color:var(--text3);">Carregando garagens...</span></div>`;
  }

  // Resumo total
  let totalGaragens=0;
  EMPRESAS.forEach(emp=>{if(data[emp])totalGaragens+=data[emp].length;});

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">`;
  h+=`<div class="sec-title">Garagens por empresa</div>`;
  h+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 18px;display:flex;align-items:center;gap:10px;">
    <span style="font-size:11px;color:var(--text3);">Total de garagens</span>
    <span style="font-size:20px;font-weight:700;font-family:'Syne',sans-serif;color:${accentColor};">${totalGaragens}</span>
  </div></div>`;

  h+=`<div class="garagens-grid">`;
  EMPRESAS.forEach(emp=>{
    const garagens=data[emp]||[];
    h+=`<div class="garagem-card">
      <div class="garagem-card-header">
        <div class="garagem-empresa">${emp}</div>
        <span class="garagem-count ${accentClass}">${garagens.length} garagem${garagens.length!==1?'s':''}</span>
      </div>
      <div class="garagem-list">`;
    if(garagens.length===0){
      h+=`<div class="garagem-empty">Nenhuma garagem cadastrada</div>`;
    } else {
      // Conta duplicatas para mostrar quantidade
      const countMap={};
      garagens.forEach(g=>{countMap[g]=(countMap[g]||0)+1;});
      const unique=Object.keys(countMap);
      unique.forEach(nome=>{
        const qtd=countMap[nome];
        h+=`<div class="garagem-item">
          <span class="garagem-nome">${nome}</span>
          ${qtd>1?`<span class="garagem-qtd">${qtd}x</span>`:''}
        </div>`;
      });
    }
    h+=`</div></div>`;
  });
  h+=`</div>`;
  return h;
}

/* ── EVENTOS ── */
function addFoto(mi,input){const file=input.files[0];if(!file)return;if(camps[mi].fotos.length>=3)return;const reader=new FileReader();reader.onload=e=>{camps[mi].fotos.push(e.target.result);if(camps[mi].open)document.getElementById('body-'+mi).innerHTML=renderBody(mi);};reader.readAsDataURL(file);}
function rmFoto(mi,fi){camps[mi].fotos.splice(fi,1);if(camps[mi].open)document.getElementById('body-'+mi).innerHTML=renderBody(mi);}
function dropFoto(mi,ev){const file=ev.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;if(camps[mi].fotos.length>=3)return;const reader=new FileReader();reader.onload=e=>{camps[mi].fotos.push(e.target.result);if(camps[mi].open)document.getElementById('body-'+mi).innerHTML=renderBody(mi);};reader.readAsDataURL(file);}
function addArte(mi,key,input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{camps[mi].artes[key]=e.target.result;if(camps[mi].open)document.getElementById('body-'+mi).innerHTML=renderBody(mi);};reader.readAsDataURL(file);}
function rmArte(mi,key){camps[mi].artes[key]=null;if(camps[mi].open)document.getElementById('body-'+mi).innerHTML=renderBody(mi);}
function dropArte(mi,key,ev){const file=ev.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;const reader=new FileReader();reader.onload=e=>{camps[mi].artes[key]=e.target.result;if(camps[mi].open)document.getElementById('body-'+mi).innerHTML=renderBody(mi);};reader.readAsDataURL(file);}
function toggleCard(mi){
  camps[mi].open=!camps[mi].open;
  const body=document.getElementById('body-'+mi);const card=document.getElementById('card-'+mi);
  if(body){if(camps[mi].open){body.style.display='block';body.innerHTML=renderBody(mi);}else body.style.display='none';}
  if(card){card.className=camps[mi].open?'camp-card open':'camp-card';const ch=card.querySelector('.chevron');if(ch)ch.className=camps[mi].open?'chevron open':'chevron';}
}
function toggleOrc(mi,ri){camps[mi].orc[ri]=!camps[mi].orc[ri];if(camps[mi].open)document.getElementById('body-'+mi).innerHTML=renderBody(mi);refreshHeader(mi);updMetrics();}
function toggleReal(mi,ri){camps[mi].real[ri].sel=!camps[mi].real[ri].sel;if(camps[mi].open)document.getElementById('body-'+mi).innerHTML=renderBody(mi);refreshHeader(mi);updMetrics();}
function updateRealRow(mi,ri){
  const r=camps[mi].real[ri];
  const p=r.price!==null?r.price:(resources[ri].price||0);
  const q=r.qty!==null?r.qty:0;
  const sub=p*q;
  const subEl=document.getElementById('real-sub-'+mi+'-'+ri);
  if(subEl)subEl.textContent=sub>0?'R$ '+fmt(sub):'—';
  const totEl=document.getElementById('real-total-row-'+mi);
  if(totEl)totEl.textContent='R$ '+fmt(calcReal(mi));
}
function refreshHeader(mi){
  const ot=calcOrc(mi),rt=calcReal(mi);
  const ho=document.getElementById('hdr-orc-'+mi);const hr=document.getElementById('hdr-real-'+mi);
  if(ho){ho.textContent='R$ '+fmt(ot);ho.style.color=ot>0?'var(--orange2)':'var(--text3)';}
  if(hr){hr.textContent='R$ '+fmt(rt);hr.style.color=rt>0?'var(--green)':'var(--text3)';}
}
function refreshAllHeaders(){CI.forEach(mi=>refreshHeader(mi));updMetrics();}

/* ── LOAD ── */
const FETCH_TIMEOUT=8000; // 8 segundos — ajuste se necessário

function fetchComTimeout(url,opts={}){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),FETCH_TIMEOUT);
  return fetch(url,{...opts,signal:controller.signal}).finally(()=>clearTimeout(timer));
}

async function reloadAll(){
  const btn=document.querySelector('.btn-reload');
  if(btn){btn.textContent='Atualizando...';btn.disabled=true;}
  await Promise.allSettled([loadMot(),loadFaixa(),loadBanner()]);
  if(activeTab==='quadro')document.getElementById('mrow').style.display='grid';
  if(btn){btn.textContent='↻ Atualizar dados';btn.disabled=false;}
}

async function loadMot(){
  try{
    const r=await fetchComTimeout(CSV_MOT,{cache:'no-store'});
    const t=await r.text();parseMot(t);
  }catch(e){
    document.getElementById('pnl-quadro').innerHTML=errMsg('Quadro de motoristas indisponível','Firewall ou conexão bloqueou o acesso ao Google Sheets.');
  }
}

async function loadFaixa(){
  try{
    const r=await fetchComTimeout(CSV_FAIXA,{cache:'no-store'});
    const t=await r.text();
    garaFaixa=parseGaragens(t,EMPRESAS);
    document.getElementById('pnl-gfaixa').innerHTML=renderGaragens(garaFaixa,'faixa');
  }catch(e){
    document.getElementById('pnl-gfaixa').innerHTML=errMsg('Garagens Faixa indisponível','Não foi possível carregar os dados.');
  }
}

async function loadBanner(){
  try{
    const r=await fetchComTimeout(CSV_BANNER,{cache:'no-store'});
    const t=await r.text();
    garaBanner=parseGaragens(t,EMPRESAS);
    document.getElementById('pnl-gbanner').innerHTML=renderGaragens(garaBanner,'banner');
  }catch(e){
    document.getElementById('pnl-gbanner').innerHTML=errMsg('Garagens Banner indisponível','Não foi possível carregar os dados.');
  }
}

function errMsg(titulo,sub){
  return `<div style="text-align:center;padding:48px 24px;">
    <div style="font-size:32px;margin-bottom:10px;">📡</div>
    <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;">${titulo}</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:16px;max-width:320px;margin-left:auto;margin-right:auto;line-height:1.6;">${sub}<br>Verifique a conexão ou use uma rede sem restrições corporativas.</div>
    <button onclick="reloadAll()" class="btn-reload" style="width:auto;padding:8px 20px;">↻ Tentar novamente</button>
  </div>`;
}

/* ── INIT ── */
renderRecursos();
renderCampanhas();
document.getElementById('pnl-quadro').innerHTML=`<div class="loader-screen"><div class="spinner"></div><span style="font-size:13px;color:var(--text3);">Conectando ao Google Sheets...</span></div>`;
document.getElementById('pnl-gfaixa').innerHTML=`<div class="loader-screen"><div class="spinner"></div><span style="font-size:13px;color:var(--text3);">Carregando garagens...</span></div>`;
document.getElementById('pnl-gbanner').innerHTML=`<div class="loader-screen"><div class="spinner"></div><span style="font-size:13px;color:var(--text3);">Carregando garagens...</span></div>`;

// Carrega cada fonte independentemente — se uma falhar não trava as outras
loadMot();
loadFaixa();
loadBanner();
</script>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,doc,setDoc,getDoc,collection}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

function fbStatus(msg,cor){
  const dot=document.getElementById('fb-dot');
  const st=document.getElementById('fb-status');
  if(dot)dot.style.background=cor;
  if(st)st.textContent=msg;
}

/* ── SALVAR ── */
window.salvarFirebase=async function(){
  fbStatus('Salvando...','#f0a947');
  try{
    // Recursos
    const resData={};
    resources.forEach((r,i)=>resData[i]={name:r.name,price:r.price});
    await setDoc(doc(db,'orcamento','recursos'),{data:resData,ts:Date.now()});

    // Campanhas — texto e seleções sem imagens
    const campsData={};
    CI.forEach(mi=>{
      const c=camps[mi];
      campsData[mi]={
        theme:c.theme||'',
        resumo:c.resumo||'',
        orc:c.orc,
        real:c.real.map(r=>({sel:r.sel,price:r.price,qty:r.qty}))
      };
    });
    await setDoc(doc(db,'orcamento','campanhas'),{data:campsData,ts:Date.now()});

    // Extras
    const extrasData=extras.map(ex=>({
      ativa:ex.ativa,mes:ex.mes,theme:ex.theme||'',resumo:ex.resumo||'',
      orc:ex.orc,
      real:ex.real.map(r=>({sel:r.sel,price:r.price,qty:r.qty}))
    }));
    await setDoc(doc(db,'orcamento','extras'),{data:extrasData,ts:Date.now()});

    // Artes por mês (docs separados para não estourar limite)
    for(const mi of CI){
      const a=camps[mi].artes;
      const f=camps[mi].fotos;
      await setDoc(doc(db,'orcamento','artes_'+mi),{artes:a,fotos:f,ts:Date.now()});
    }

    // Artes extras
    for(let ei=0;ei<extras.length;ei++){
      await setDoc(doc(db,'orcamento','xartes_'+ei),{artes:extras[ei].artes,fotos:extras[ei].fotos,ts:Date.now()});
    }

    fbStatus('Salvo ✓','#18b87a');
    setTimeout(()=>fbStatus('Firebase conectado','#18b87a'),3000);
  }catch(e){
    console.error(e);
    fbStatus('Erro ao salvar','#e05555');
  }
};

/* ── CARREGAR ── */
async function carregarFirebase(){
  fbStatus('Carregando...','#f0a947');
  try{
    // Recursos
    const resSnap=await getDoc(doc(db,'orcamento','recursos'));
    if(resSnap.exists()){
      const d=resSnap.data().data;
      Object.keys(d).forEach(i=>{if(resources[i])resources[i].price=d[i].price||0;});
      renderRecursos();
    }

    // Campanhas
    const campSnap=await getDoc(doc(db,'orcamento','campanhas'));
    if(campSnap.exists()){
      const d=campSnap.data().data;
      Object.keys(d).forEach(mi=>{
        const m=parseInt(mi);
        if(camps[m]){
          camps[m].theme=d[mi].theme||'';
          camps[m].resumo=d[mi].resumo||'';
          camps[m].orc=d[mi].orc||RES.map(()=>false);
          camps[m].real=(d[mi].real||[]).map(r=>({sel:r.sel||false,price:r.price??null,qty:r.qty??null}));
        }
      });
      renderCampanhas();
    }

    // Extras
    const extSnap=await getDoc(doc(db,'orcamento','extras'));
    if(extSnap.exists()){
      const d=extSnap.data().data;
      d.forEach((ex,ei)=>{
        if(extras[ei]){
          extras[ei].ativa=ex.ativa||false;
          extras[ei].mes=ex.mes??null;
          extras[ei].theme=ex.theme||'';
          extras[ei].resumo=ex.resumo||'';
          extras[ei].orc=ex.orc||RES.map(()=>false);
          extras[ei].real=(ex.real||[]).map(r=>({sel:r.sel||false,price:r.price??null,qty:r.qty??null}));
        }
      });
    }

    // Artes por mês
    for(const mi of CI){
      const aSnap=await getDoc(doc(db,'orcamento','artes_'+mi));
      if(aSnap.exists()){
        const d=aSnap.data();
        if(d.artes)camps[mi].artes=d.artes;
        if(d.fotos)camps[mi].fotos=d.fotos;
      }
    }

    // Artes extras
    for(let ei=0;ei<extras.length;ei++){
      const xSnap=await getDoc(doc(db,'orcamento','xartes_'+ei));
      if(xSnap.exists()){
        const d=xSnap.data();
        if(d.artes)extras[ei].artes=d.artes;
        if(d.fotos)extras[ei].fotos=d.fotos;
      }
    }

    renderCampanhas();
    refreshAllHeaders();
    updMetrics();
    fbStatus('Firebase conectado ✓','#18b87a');
  }catch(e){
    console.error(e);
    fbStatus('Erro ao carregar','#e05555');
  }
}

// Auto-save com debounce de 3 segundos
let fbTimer=null;
window.autoSave=function(){
  clearTimeout(fbTimer);
  fbStatus('Modificado...','#f0a947');
  fbTimer=setTimeout(()=>window.salvarFirebase(),3000);
};

// Inicia carregamento
carregarFirebase();
</script>
